<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiniela de Córdoba</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .digit-box {
      font-weight: bold;
      color: white;
      background-color: darkgreen;
      height: 50px;
      width: 50px;
      margin: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      border-radius: 0.25rem;
    }

    #digit-display { min-height: 60px; }
  </style>
</head>
<body class="bg-light">

  <div class="container py-4" style="max-width: 640px;">
    <h1 class="text-center mb-4">Quiniela de Córdoba</h1>

    <div
      id="digit-display"
      class="d-flex flex-wrap justify-content-center mb-4"
      aria-live="assertive"
      aria-label="Número siendo sorteado"
    ></div>

    <div class="text-center mb-4">
      <button id="btn-sorteo" class="btn btn-success btn-lg" type="button">
        Iniciar sorteo
      </button>
    </div>

    <div id="results-section" hidden>
      <h2 class="h5 mb-3">Resultados del sorteo</h2>
      <div class="table-responsive">
        <table class="table table-striped table-bordered table-hover text-center">
          <caption class="visually-hidden">Tabla de resultados — Quiniela de Córdoba</caption>
          <thead class="table-dark">
            <tr>
              <th scope="col">#</th>
              <th scope="col">Combinación</th>
            </tr>
          </thead>
          <tbody id="results-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const STORAGE_KEY   = 'quiniela-state';
    const TOTAL         = 20;
    const DIGIT_MS      = 300;
    const ROUND_DELAY   = 2000;

    const display        = document.getElementById('digit-display');
    const btn            = document.getElementById('btn-sorteo');
    const resultsSection = document.getElementById('results-section');
    const tbody          = document.getElementById('results-body');

    let state = { combinations: [], running: false, done: false };

    function loadState() {
      try {
        const saved = sessionStorage.getItem(STORAGE_KEY);
        if (saved) state = JSON.parse(saved);
      } catch {}
    }

    function saveState() {
      sessionStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function clearState() {
      sessionStorage.removeItem(STORAGE_KEY);
      state = { combinations: [], running: false, done: false };
    }

    function generateUniqueCombination() {
      const existing = new Set(state.combinations.map(c => c.join('')));
      let combo;
      do {
        combo = Array.from({ length: 4 }, () => Math.floor(Math.random() * 10));
      } while (existing.has(combo.join('')));
      return combo;
    }

    function addRowToTable(combo, index) {
      resultsSection.hidden = false;
      const tr = document.createElement('tr');
      tr.innerHTML = `<th scope="row">${index}</th><td><strong>${combo.join(' - ')}</strong></td>`;
      tbody.appendChild(tr);
    }

    function renderTable() {
      tbody.innerHTML = '';
      if (state.combinations.length > 0) {
        resultsSection.hidden = false;
        state.combinations.forEach((combo, i) => addRowToTable(combo, i + 1));
      }
    }

    function showDigit(digit) {
      const box = document.createElement('div');
      box.className = 'digit-box';
      box.textContent = digit;
      box.setAttribute('aria-hidden', 'true');
      display.appendChild(box);
    }

    const delay = ms => new Promise(resolve => setTimeout(resolve, ms));

    async function runSorteo() {
      btn.disabled    = true;
      state.running   = true;
      saveState();

      const startAt = state.combinations.length;

      for (let i = startAt; i < TOTAL; i++) {
        display.innerHTML = '';
        const combo = generateUniqueCombination();

        for (const digit of combo) {
          await delay(DIGIT_MS);
          showDigit(digit);
        }

        state.combinations.push(combo);
        saveState();
        addRowToTable(combo, state.combinations.length);

        if (i < TOTAL - 1) {
          await delay(ROUND_DELAY);
        }
      }

      display.innerHTML = '';
      state.running = false;
      state.done    = true;
      saveState();

      btn.disabled  = false;
      btn.textContent = 'Volver a sortear';
      btn.classList.replace('btn-success', 'btn-secondary');
    }

    btn.addEventListener('click', () => {
      if (state.done) {
        clearState();
        tbody.innerHTML = '';
        resultsSection.hidden = true;
        btn.textContent = 'Iniciar sorteo';
        btn.classList.replace('btn-secondary', 'btn-success');
        return;
      }
      runSorteo();
    });

    // Init — restore from SessionStorage
    loadState();
    renderTable();

    if (state.done) {
      btn.textContent = 'Volver a sortear';
      btn.classList.replace('btn-success', 'btn-secondary');
    } else if (state.running) {
      runSorteo();
    }
  </script>

</body>
</html>
