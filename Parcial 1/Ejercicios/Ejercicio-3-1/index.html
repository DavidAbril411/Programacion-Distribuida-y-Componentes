<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Compras</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <div class="container py-4" style="max-width: 560px;">
    <h1 class="mb-4">Lista de Compras</h1>

    <form id="add-form" class="input-group mb-4" aria-label="Agregar artículo">
      <label for="item-input" class="visually-hidden">Nombre del artículo</label>
      <input
        type="text"
        id="item-input"
        class="form-control"
        placeholder="Agregar artículo..."
        required
        autocomplete="off"
        aria-required="true"
      >
      <button type="submit" class="btn btn-primary">Agregar</button>
    </form>

    <ul
      id="shopping-list"
      class="list-group"
      aria-label="Lista de compras"
      aria-live="polite"
    ></ul>

    <p id="empty-msg" class="text-muted text-center mt-3 small">La lista está vacía.</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
