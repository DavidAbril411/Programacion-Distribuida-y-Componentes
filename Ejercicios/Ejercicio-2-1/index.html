<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Cursos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-8 col-lg-6">
        <div class="card shadow-sm">
          <div class="card-body p-4">

            <h1 class="card-title h3 mb-4">Registro de Cursos</h1>

            <form id="register-form" novalidate>

              <fieldset>
                <legend class="h6 text-muted mb-3">Información Personal</legend>

                <div class="mb-3">
                  <label for="fullname" class="form-label">
                    Nombre completo <span aria-hidden="true" class="text-danger">*</span>
                  </label>
                  <input
                    type="text"
                    class="form-control"
                    id="fullname"
                    name="fullname"
                    required
                    autocomplete="name"
                    aria-required="true"
                  >
                  <div class="invalid-feedback">Ingresá tu nombre completo.</div>
                </div>

                <div class="mb-3">
                  <label for="email" class="form-label">
                    Correo electrónico <span aria-hidden="true" class="text-danger">*</span>
                  </label>
                  <input
                    type="email"
                    class="form-control"
                    id="email"
                    name="email"
                    required
                    autocomplete="email"
                    aria-required="true"
                  >
                  <div class="invalid-feedback">Ingresá un correo electrónico válido.</div>
                </div>

                <div class="mb-3">
                  <label for="password" class="form-label">
                    Contraseña <span aria-hidden="true" class="text-danger">*</span>
                  </label>
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    name="password"
                    required
                    minlength="8"
                    autocomplete="new-password"
                    aria-required="true"
                    aria-describedby="password-hint"
                  >
                  <div id="password-hint" class="form-text">Mínimo 8 caracteres.</div>
                  <div class="invalid-feedback">La contraseña debe tener al menos 8 caracteres.</div>
                </div>
              </fieldset>

              <fieldset class="mt-4">
                <legend class="h6 text-muted mb-3">Selección de Curso</legend>

                <div class="mb-3">
                  <label for="course" class="form-label">
                    Curso <span aria-hidden="true" class="text-danger">*</span>
                  </label>
                  <select
                    class="form-select"
                    id="course"
                    name="course"
                    required
                    aria-required="true"
                  >
                    <option value="">-- Seleccioná un curso --</option>
                    <option value="intro">Introducción a la Programación</option>
                    <option value="webdesign">Diseño Web para Principiantes</option>
                    <option value="js-advanced">Curso Avanzado de JavaScript</option>
                  </select>
                  <div class="invalid-feedback">Seleccioná un curso.</div>
                </div>
              </fieldset>

              <fieldset class="mt-4">
                <legend class="h6 text-muted mb-3">Temas de Interés</legend>

                <div class="form-check mb-2">
                  <input class="form-check-input" type="checkbox" id="chk-news" name="interests" value="news">
                  <label class="form-check-label" for="chk-news">Noticias de Tecnología</label>
                </div>
                <div class="form-check mb-2">
                  <input class="form-check-input" type="checkbox" id="chk-courses" name="interests" value="new-courses">
                  <label class="form-check-label" for="chk-courses">Cursos Nuevos</label>
                </div>
                <div class="form-check mb-3">
                  <input class="form-check-input" type="checkbox" id="chk-offers" name="interests" value="offers">
                  <label class="form-check-label" for="chk-offers">Ofertas Especiales</label>
                </div>
              </fieldset>

              <button type="submit" class="btn btn-primary btn-lg w-100 mt-2">
                Registrarse
              </button>

            </form>

          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', function (e) {
      if (!this.checkValidity()) {
        e.preventDefault();
        e.stopPropagation();
      }
      this.classList.add('was-validated');
    });
  </script>

</body>
</html>
