<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ejercicio 1</title>
</head>
<body>
    <form action="" class="body__form" onsubmit="agregarElemento(event)">
        <label for="elemento" class="body__form__label">Elemento Obligatorio</label>
        <input type="text" id="elemento" name="elemento" class="body__form__input" required placeholder="Indica el texto del elemento"
               value="">
        <button type="submit" class="body__form__button">Agregar</button>
    </form>
    <ul id="lista" class="body__lista">
        <li class="body__lista__item">Elemento 1</li>
        <li class="body__lista__item">Elemento 2</li>
    </ul>
</body>
<script>
    function agregarElemento(event) {
        event.preventDefault();
        let valor = document.getElementById("elemento").value;
        elemento = document.createElement('li');
        elemento.textContent = valor;
        boton_editar = document.createElement('button');
        boton_editar.innerText = 'Editar';
        boton_eliminar = document.createElement('button');
        boton_eliminar.innerText = 'Eliminar';
        elemento.appendChild(boton_editar);
        elemento.appendChild(boton_eliminar);
        document.getElementById("lista").appendChild(elemento);
    }
</script>
</html>
